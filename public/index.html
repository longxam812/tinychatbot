<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask Tiny Anonymously</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f9fafb;
      color: #111827;
      height: 100vh;
    }
    #app {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .home, .login {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
      padding: 24px;
      text-align: center;
    }
    .home h1, .login h2 { font-size: 24px; font-weight: 800; }
    .home p, .muted { color: #6b7280; line-height: 1.6; font-size: 14px; }
    .btn {
      border: none;
      cursor: pointer;
      border-radius: 14px;
      padding: 13px 16px;
      font-weight: 700;
      font-size: 15px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
    }
    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
    }
    .input {
      width: 100%;
      border: 1.5px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }
    .session-box {
      background: #fafafa;
      border: 1px dashed #d1d5db;
      border-radius: 14px;
      padding: 12px;
    }
    .session-id {
      font-size: 16px;
      font-weight: 800;
      color: #4f46e5;
      letter-spacing: 1.5px;
    }

    .hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid #f3f4f6;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .av {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-weight: 800;
      flex-shrink: 0;
    }
    .hdr-name { font-weight: 800; font-size: 16px; }
    .hdr-sub { font-size: 12px; color: #10b981; }

    .msgs {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #fff;
    }

    .bot-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin-bottom: 2px;
    }
    .bot-col, .user-col {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .bot-name {
      font-size: 11px;
      color: #9ca3af;
      padding-left: 2px;
    }
    .bot-bub {
      background: #f3f4f6;
      color: #111827;
      padding: 10px 14px;
      border-radius: 18px 18px 18px 4px;
      max-width: 320px;
      line-height: 1.55;
      white-space: pre-wrap;
      font-size: 14px;
    }
    .user-wrap {
      display: flex;
      justify-content: flex-end;
    }
    .user-col {
      align-items: flex-end;
    }
    .user-bub {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      padding: 10px 14px;
      border-radius: 18px 18px 4px 18px;
      max-width: 320px;
      line-height: 1.55;
      white-space: pre-wrap;
      font-size: 14px;
    }
    .ts {
      font-size: 10px;
      color: #9ca3af;
      padding: 0 4px;
    }

    .typing {
      display: flex;
      gap: 4px;
      padding: 2px 0;
      align-items: center;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #9ca3af;
      animation: bounce 1s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
    }

    .input-row, .admin-input {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      border-top: 1px solid #f3f4f6;
      background: #fff;
    }
    .msg-input {
      flex: 1;
      border: 1.5px solid #e5e7eb;
      border-radius: 24px;
      padding: 11px 15px;
      font-size: 14px;
      outline: none;
      background: #fafafa;
    }
    .send-btn {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      font-size: 18px;
      font-weight: 800;
    }

    .admin {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    .sidebar {
      width: 260px;
      border-right: 1px solid #f3f4f6;
      overflow-y: auto;
      flex-shrink: 0;
      background: #fff;
    }
    .side-top {
      padding: 14px 16px;
      border-bottom: 1px solid #f3f4f6;
      font-weight: 800;
      font-size: 14px;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 2;
    }
    .sess-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid #fafafa;
      cursor: pointer;
    }
    .sess-item:hover { background: #f9fafb; }
    .sess-item.active { background: #eff6ff; }
    .sess-id-line { font-size: 13px; font-weight: 700; }
    .sess-prev {
      font-size: 11px;
      color: #9ca3af;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .badge {
      min-width: 20px;
      height: 20px;
      border-radius: 10px;
      background: #ef4444;
      color: white;
      font-size: 11px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
    }
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-hdr {
      padding: 14px 18px;
      border-bottom: 1px solid #f3f4f6;
      font-weight: 800;
      font-size: 15px;
      background: #fff;
    }
    .empty-note, .none-sel {
      padding: 16px;
      color: #9ca3af;
      font-size: 14px;
    }

    .linkish {
      color: #4f46e5;
      cursor: pointer;
      font-size: 13px;
    }
    .err {
      color: #ef4444;
      font-size: 12px;
      text-align: left;
    }

    @media (max-width: 640px) {
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 12px;
  }

  #app {
    width: 80%;
    min-height: 75vh;
    max-height: 75vh;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,.08);
  }

  .home,
  .login {
    min-height: 75vh;
    padding: 18px;
  }

  .admin {
    flex-direction: column;
    height: 75vh;
  }

  .sidebar {
    width: 100%;
    height: 180px;
    border-right: none;
    border-bottom: 1px solid #f3f4f6;
  }

  .msgs {
    padding: 12px 10px;
  }

  .input-row,
  .admin-input {
    padding: 8px 10px;
  }
}
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const SUPABASE_URL = "https://wnjqnqifkpivngzatkpm.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_h9u-KPa6KxeOkdFYHUNWnw_m89NyyfK";
    const ADMIN_PASS = "tiny2024";
    const WELCOME_TEXT =
`Hi! What would you like to send to Tiny? 😊

1️⃣ Question
2️⃣ Feedback
3️⃣ Inquiry
4️⃣ Other request`;

    const defaultHeaders = {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
      "Content-Type": "application/json"
    };

    const qs = (obj) => new URLSearchParams(obj).toString();

    function uid() {
      return Math.random().toString(36).slice(2, 8);
    }

    function fmtTime(ts) {
      return new Date(ts).toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function el(tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text !== undefined) node.textContent = text;
      return node;
    }

    const db = {
      async insertMessage(row) {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/messages`, {
          method: "POST",
          headers: defaultHeaders,
          body: JSON.stringify(row)
        });

        if (!res.ok) {
          const raw = await res.text();
          throw new Error(`Insert failed: ${raw}`);
        }
      },

      async getMessages(sessionId) {
        const url = `${SUPABASE_URL}/rest/v1/messages?${qs({
          select: "*",
          session_id: `eq.${sessionId}`,
          order: "created_at.asc"
        })}`;

        const res = await fetch(url, { headers: defaultHeaders });
        if (!res.ok) {
          const raw = await res.text();
          throw new Error(`Fetch messages failed: ${raw}`);
        }
        return await res.json();
      },

      async getSessions() {
        const url = `${SUPABASE_URL}/rest/v1/messages?${qs({
          select: "session_id,created_at,text"
        })}`;

        const res = await fetch(url, { headers: defaultHeaders });
        if (!res.ok) {
          const raw = await res.text();
          throw new Error(`Fetch sessions failed: ${raw}`);
        }

        const rows = await res.json();
        const map = new Map();

        for (const row of rows) {
          if (!map.has(row.session_id)) {
            map.set(row.session_id, []);
          }
          map.get(row.session_id).push(row);
        }

        const sessions = [];
        for (const [sessionId, items] of map.entries()) {
          items.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
          const last = items[items.length - 1];
          sessions.push({
            session_id: sessionId,
            last_text: last?.text || "",
            last_created_at: last?.created_at || null
          });
        }

        sessions.sort((a, b) => {
          return new Date(b.last_created_at || 0) - new Date(a.last_created_at || 0);
        });

        return sessions;
      },

      async getUnreadCount(sessionId) {
        const url = `${SUPABASE_URL}/rest/v1/messages?${qs({
          select: "id",
          session_id: `eq.${sessionId}`,
          role: "eq.user",
          read: "eq.false"
        })}`;

        const res = await fetch(url, { headers: defaultHeaders });
        if (!res.ok) {
          const raw = await res.text();
          throw new Error(`Unread query failed: ${raw}`);
        }

        const rows = await res.json();
        return rows.length;
      },

      async markUserMessagesRead(sessionId) {
        const url = `${SUPABASE_URL}/rest/v1/messages?${qs({
          session_id: `eq.${sessionId}`,
          role: "eq.user",
          read: "eq.false"
        })}`;

        const res = await fetch(url, {
          method: "PATCH",
          headers: defaultHeaders,
          body: JSON.stringify({ read: true })
        });

        if (!res.ok) {
          const raw = await res.text();
          throw new Error(`Mark read failed: ${raw}`);
        }
      }
    };

    async function askAI(messages) {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
        },
        body: JSON.stringify({
          messages: messages.map(m => ({
            role: m.role === "user" ? "user" : "assistant",
            content: m.text
          }))
        })
      });

      const raw = await res.text();

      if (!res.ok) {
        throw new Error(`Edge function failed: ${raw}`);
      }

      const data = JSON.parse(raw);
      return data.reply || "Got it! Tiny will get back to you soon 😊";
    }

    function makeBotBubble(text, ts) {
      const row = el("div", "bot-row");
      const avatar = el("div", "av", "T");
      const col = el("div", "bot-col");
      const name = el("div", "bot-name", "Tiny");
      const bubble = el("div", "bot-bub", text);

      col.appendChild(name);
      col.appendChild(bubble);

      if (ts) {
        const time = el("div", "ts", fmtTime(ts));
        col.appendChild(time);
      }

      row.appendChild(avatar);
      row.appendChild(col);
      return row;
    }

    function makeUserBubble(text, ts) {
      const wrap = el("div", "user-wrap");
      const col = el("div", "user-col");
      const bubble = el("div", "user-bub", text);
      const time = el("div", "ts", fmtTime(ts));

      col.appendChild(bubble);
      col.appendChild(time);
      wrap.appendChild(col);
      return wrap;
    }

    function makeTypingBubble() {
      const row = el("div", "bot-row");
      const avatar = el("div", "av", "T");
      const col = el("div", "bot-col");
      const bubble = el("div", "bot-bub");

      const typing = el("div", "typing");
      typing.appendChild(el("span", "dot"));
      typing.appendChild(el("span", "dot"));
      typing.appendChild(el("span", "dot"));

      bubble.appendChild(typing);
      col.appendChild(el("div", "bot-name", "Tiny"));
      col.appendChild(bubble);
      row.appendChild(avatar);
      row.appendChild(col);
      return row;
    }

    function scrollBottom(node) {
      node.scrollTop = node.scrollHeight;
    }

    function renderHome() {
      const app = document.getElementById("app");
      app.innerHTML = "";

      const sessionId = uid();
      const page = el("div", "home");

      const icon = el("div", null, "🦔");
      icon.style.fontSize = "54px";

      const title = el("h1", null, "Ask Tiny Anonymously");
      const desc = el("p", null, "Ask anything without worrying about who sees it. AI will confirm receipt, then Tiny can reply later.");

      const startBtn = el("button", "btn btn-primary", "💬 Ask anonymously");
      startBtn.onclick = () => renderChat(sessionId);

      const box = el("div", "session-box");
      box.innerHTML = `
        <div class="muted" style="font-size:11px;margin-bottom:4px;">Your Session ID</div>
        <div class="session-id">#${sessionId}</div>
      `;

      const loginBtn = el("button", "btn btn-secondary", "🔐 Tiny login");
      loginBtn.onclick = renderLogin;

      page.appendChild(icon);
      page.appendChild(title);
      page.appendChild(desc);
      page.appendChild(startBtn);
      page.appendChild(box);
      page.appendChild(loginBtn);

      app.appendChild(page);
    }

    function renderLogin() {
      const app = document.getElementById("app");
      app.innerHTML = "";

      const page = el("div", "login");
      const icon = el("div", null, "🔒");
      icon.style.fontSize = "42px";

      const title = el("h2", null, "Tiny Dashboard");
      const input = el("input", "input");
      input.type = "password";
      input.placeholder = "Password...";
      const error = el("div", "err");
      const loginBtn = el("button", "btn btn-primary", "Login");
      const back = el("div", "linkish", "← Back");

      loginBtn.onclick = () => {
        if (input.value === ADMIN_PASS) {
          renderAdmin();
        } else {
          error.textContent = "Wrong password";
        }
      };

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") loginBtn.click();
      });

      back.onclick = renderHome;

      page.appendChild(icon);
      page.appendChild(title);
      page.appendChild(input);
      page.appendChild(error);
      page.appendChild(loginBtn);
      page.appendChild(back);

      app.appendChild(page);
    }

    async function renderChat(sessionId) {
      const app = document.getElementById("app");
      app.innerHTML = "";

      const page = document.createElement("div");
      page.style.display = "flex";
      page.style.flexDirection = "column";
      page.style.minHeight = "100vh";

      const hdr = el("div", "hdr");
      hdr.innerHTML = `
        <div class="av">T</div>
        <div>
          <div class="hdr-name">Tiny 🦔</div>
          <div class="hdr-sub">Anonymous & secure</div>
        </div>
      `;

      const msgs = el("div", "msgs");
      const inputRow = el("div", "input-row");
      const input = el("input", "msg-input");
      input.placeholder = "Type a message...";
      const sendBtn = el("button", "send-btn", "➜");

      inputRow.appendChild(input);
      inputRow.appendChild(sendBtn);

      page.appendChild(hdr);
      page.appendChild(msgs);
      page.appendChild(inputRow);
      app.appendChild(page);

      msgs.appendChild(makeBotBubble(WELCOME_TEXT));

      try {
        const existing = await db.getMessages(sessionId);
        for (const m of existing) {
          const ts = new Date(m.created_at).getTime();
          msgs.appendChild(
            m.role === "user"
              ? makeUserBubble(m.text, ts)
              : makeBotBubble(m.text, ts)
          );
        }
        scrollBottom(msgs);
      } catch (err) {
        msgs.appendChild(makeBotBubble("Could not load previous messages."));
        console.error(err);
      }

      let busy = false;
      let poll = null;
      let lastCount = 0;

      async function refreshMessages() {
        try {
          const all = await db.getMessages(sessionId);
          if (all.length === lastCount) return;

          msgs.innerHTML = "";
          msgs.appendChild(makeBotBubble(WELCOME_TEXT));

          for (const m of all) {
            const ts = new Date(m.created_at).getTime();
            msgs.appendChild(
              m.role === "user"
                ? makeUserBubble(m.text, ts)
                : makeBotBubble(m.text, ts)
            );
          }

          lastCount = all.length;
          scrollBottom(msgs);
        } catch (err) {
          console.error("refreshMessages error:", err);
        }
      }

      try {
        const nowAll = await db.getMessages(sessionId);
        lastCount = nowAll.length;
      } catch {}

      poll = setInterval(refreshMessages, 3000);

      async function sendMessage() {
        const text = input.value.trim();
        if (!text || busy) return;

        busy = true;
        input.disabled = true;
        sendBtn.disabled = true;

        input.value = "";
        msgs.appendChild(makeUserBubble(text, Date.now()));
        const typing = makeTypingBubble();
        msgs.appendChild(typing);
        scrollBottom(msgs);

        try {
          await db.insertMessage({
            session_id: sessionId,
            role: "user",
            text,
            read: false
          });

          const allAfterUser = await db.getMessages(sessionId);
          const reply = await askAI(allAfterUser);

          await db.insertMessage({
            session_id: sessionId,
            role: "bot",
            text: reply,
            read: true
          });

          typing.remove();
          msgs.appendChild(makeBotBubble(reply, Date.now()));
          scrollBottom(msgs);

          const finalAll = await db.getMessages(sessionId);
          lastCount = finalAll.length;
        } catch (err) {
          console.error("sendMessage error:", err);
          typing.remove();
          msgs.appendChild(makeBotBubble("Got it! Tiny will get back to you soon 😊", Date.now()));
          scrollBottom(msgs);
        } finally {
          busy = false;
          input.disabled = false;
          sendBtn.disabled = false;
          input.focus();
        }
      }

      sendBtn.onclick = sendMessage;
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      window.onbeforeunload = () => {
        if (poll) clearInterval(poll);
      };
    }

    async function renderAdmin() {
      const app = document.getElementById("app");
      app.innerHTML = "";

      const wrap = el("div", "admin");
      const sidebar = el("div", "sidebar");
      const top = el("div", "side-top", "📥 Questions");
      sidebar.appendChild(top);

      const panel = el("div", "chat-panel");
      panel.appendChild(el("div", "none-sel", "👈 Select a conversation"));

      wrap.appendChild(sidebar);
      wrap.appendChild(panel);
      app.appendChild(wrap);

      let selectedSession = null;
      let panelPoll = null;
      let sidebarPoll = null;

      async function loadSidebar() {
        try {
          const sessions = await db.getSessions();

          while (sidebar.children.length > 1) {
            sidebar.removeChild(sidebar.lastChild);
          }

          if (!sessions.length) {
            sidebar.appendChild(el("div", "empty-note", "No messages yet"));
            return;
          }

          for (const s of sessions) {
            const unread = await db.getUnreadCount(s.session_id);

            const item = el("div", "sess-item");
            if (s.session_id === selectedSession) item.classList.add("active");

            const badge = unread > 0 ? `<div class="badge">${unread}</div>` : "";

            item.innerHTML = `
              <div class="av" style="width:34px;height:34px;font-size:13px">?</div>
              <div style="flex:1;overflow:hidden;">
                <div class="sess-id-line">Anonymous #${s.session_id}</div>
                <div class="sess-prev">${(s.last_text || "").slice(0, 35)}</div>
              </div>
              ${badge}
            `;

            item.onclick = () => openSession(s.session_id);
            sidebar.appendChild(item);
          }
        } catch (err) {
          console.error("loadSidebar error:", err);
        }
      }

      async function openSession(sessionId) {
        selectedSession = sessionId;

        try {
          await db.markUserMessagesRead(sessionId);
        } catch (err) {
          console.error("mark read error:", err);
        }

        panel.innerHTML = "";

        const hdr = el("div", "chat-hdr", `Anonymous #${sessionId}`);
        const msgs = el("div", "msgs");
        const inputRow = el("div", "admin-input");
        const input = el("input", "msg-input");
        input.placeholder = "Type a reply...";
        const sendBtn = el("button", "send-btn", "➜");

        inputRow.appendChild(input);
        inputRow.appendChild(sendBtn);

        panel.appendChild(hdr);
        panel.appendChild(msgs);
        panel.appendChild(inputRow);

        async function loadThread() {
          try {
            const all = await db.getMessages(sessionId);
            msgs.innerHTML = "";

            for (const m of all) {
              const ts = new Date(m.created_at).getTime();
              msgs.appendChild(
                m.role === "user"
                  ? makeUserBubble(m.text, ts)
                  : makeBotBubble(m.text, ts)
              );
            }

            scrollBottom(msgs);
          } catch (err) {
            console.error("loadThread error:", err);
            msgs.innerHTML = "";
            msgs.appendChild(makeBotBubble("Could not load conversation."));
          }
        }

        await loadThread();
        await loadSidebar();

        if (panelPoll) clearInterval(panelPoll);
        panelPoll = setInterval(loadThread, 3000);

        async function sendReply() {
          const text = input.value.trim();
          if (!text) return;

          input.disabled = true;
          sendBtn.disabled = true;

          try {
            await db.insertMessage({
              session_id: sessionId,
              role: "bot",
              text,
              read: true
            });
            input.value = "";
            await loadThread();
            await loadSidebar();
          } catch (err) {
            console.error("sendReply error:", err);
          } finally {
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
          }
        }

        sendBtn.onclick = sendReply;
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") sendReply();
        });
      }

      await loadSidebar();
      sidebarPoll = setInterval(loadSidebar, 5000);

      window.onbeforeunload = () => {
        if (panelPoll) clearInterval(panelPoll);
        if (sidebarPoll) clearInterval(sidebarPoll);
      };
    }

    renderHome();
  </script>
</body>
</html>
