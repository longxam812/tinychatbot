<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Ask Linh Anonymously</title>
  <style>

    :root {
      --bg: #efede6;
      --bg-2: #f6f3ec;
      --panel: rgba(255,255,255,.68);
      --panel-strong: rgba(255,255,255,.82);
      --card: rgba(255,255,255,.72);
      --card-soft: rgba(255,255,255,.55);
      --line: rgba(126, 123, 112, .14);
      --line-strong: rgba(126, 123, 112, .22);
      --text: #3f3b37;
      --text-strong: #2f2b28;
      --muted: #8a8378;
      --soft: #f3efe8;
      --soft-2: #f7f3ed;
      --primary-a: #eb8c52;
      --primary-b: #d9703d;
      --primary-soft: #fff0e8;
      --green: #5f8c72;
      --amber: #d97a45;
      --red: #bb5a4f;
      --shadow: 0 28px 60px rgba(91, 80, 64, .10);
      --shadow-soft: 0 18px 40px rgba(91, 80, 64, .08);
      --radius: 30px;
      --viewport-height: 100dvh;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      background:
        radial-gradient(900px 520px at 12% 12%, rgba(255,255,255,.9), transparent 62%),
        radial-gradient(1100px 580px at 86% 88%, rgba(255,255,255,.5), transparent 54%),
        linear-gradient(180deg, #f3f1ea 0%, #efede6 48%, #ebe8e0 100%);
    }
    body {
      min-height: var(--viewport-height);
      position: relative;
      letter-spacing: -.01em;
    }
    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 36px;
      pointer-events: none;
      z-index: 0;
      filter: blur(.2px);
    }
    body::before {
      width: min(54vw, 720px);
      height: min(64vh, 760px);
      left: 17%;
      top: 4%;
      background: rgba(255,255,255,.58);
      box-shadow: 0 30px 80px rgba(88, 78, 62, .08);
    }
    body::after {
      width: min(32vw, 420px);
      height: min(40vh, 480px);
      left: max(2vw, 26px);
      top: 14%;
      background:
        linear-gradient(180deg, rgba(121,149,176,.75), rgba(121,149,176,.28)),
        linear-gradient(180deg, rgba(255,255,255,.15), rgba(255,255,255,0));
      box-shadow: 0 24px 60px rgba(86, 98, 113, .18);
    }

    button, input { font: inherit; }
    input, textarea, select { font-size: 16px; }

    #app {
      position: relative;
      z-index: 1;
      height: 100%;
    }

    .shell {
      width: min(100%, 1180px);
      height: var(--viewport-height);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,.52), rgba(255,255,255,.38));
      backdrop-filter: blur(22px);
      box-shadow: var(--shadow);
      border-left: 1px solid rgba(255,255,255,.55);
      border-right: 1px solid rgba(255,255,255,.55);
    }

    .home, .login {
      width: min(100%, 540px);
      margin: auto;
      background: linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,255,255,.58));
      border: 1px solid rgba(255,255,255,.72);
      border-radius: 34px;
      box-shadow: var(--shadow);
      padding: 30px 26px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .home::before, .login::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(340px 220px at 50% 0%, rgba(255,255,255,.85), transparent 60%);
      pointer-events: none;
    }

    .big-icon {
      font-size: 42px;
      line-height: 1;
      position: relative;
      z-index: 1;
    }
    .title {
      font-family: "DM Serif Display", "Georgia", serif;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.08;
      font-weight: 400;
      letter-spacing: -.03em;
      color: var(--text-strong);
      position: relative;
      z-index: 1;
    }
    .sub {
      font-size: 15px;
      line-height: 1.72;
      color: var(--muted);
      max-width: 34ch;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .btn {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 700;
      transition: transform .16s ease, box-shadow .18s ease, background .18s ease, opacity .18s ease;
      position: relative;
      z-index: 1;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0) scale(.985); }
    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--primary-a), var(--primary-b));
      box-shadow: 0 18px 32px rgba(217,112,61,.24);
    }
    .btn-secondary {
      background: rgba(255,255,255,.62);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.8);
      box-shadow: var(--shadow-soft);
    }
    .btn-danger {
      background: #f9eae6;
      color: #9a4f43;
      border: 1px solid rgba(201,127,107,.16);
    }
    .btn-ghost {
      background: rgba(255,255,255,.42);
      color: #5a554e;
      border: 1px solid rgba(255,255,255,.78);
    }

    .field {
      width: 100%;
      border: 1px solid rgba(126,123,112,.16);
      border-radius: 22px;
      padding: 14px 16px;
      outline: none;
      color: var(--text-strong);
      background: rgba(255,255,255,.72);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.78);
      position: relative;
      z-index: 1;
    }
    .field:focus,
    .msg-input:focus {
      border-color: rgba(217,112,61,.26);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.82),
        0 0 0 4px rgba(233,140,82,.12);
    }

    .session-box {
      background: rgba(255,255,255,.46);
      border: 1px solid rgba(126,123,112,.12);
      border-radius: 24px;
      padding: 14px;
      position: relative;
      z-index: 1;
    }
    .session-id {
      color: var(--text-strong);
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -.01em;
    }

    .corner-lock {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 3;
      width: 34px;
      height: 34px;
      border: none;
      background: transparent;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      cursor: pointer;
      font-size: 15px;
    }
    .corner-lock:hover { background: rgba(255,255,255,.42); color: var(--text); }

    .pin-icon-btn {
      border: none;
      background: transparent;
      color: var(--muted);
      padding: 4px;
      margin-left: 8px;
      border-radius: 999px;
      cursor: pointer;
      line-height: 1;
      font-size: 14px;
      flex: 0 0 auto;
    }
    .pin-icon-btn:hover { color: var(--text-strong); background: rgba(255,255,255,.5); }
    .pin-icon-btn.active { color: var(--amber); }
    .muted { color: var(--muted); }
    .tiny { font-size: 12px; text-transform: uppercase; letter-spacing: .14em; }
    .error { color: #9b4c41; font-size: 13px; text-align: left; min-height: 18px; }

    .appbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px 16px;
      border-bottom: 1px solid rgba(126,123,112,.10);
      background: linear-gradient(180deg, rgba(255,255,255,.62), rgba(255,255,255,.42));
      backdrop-filter: blur(18px);
      position: sticky;
      top: 0;
      z-index: 25;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0;
      min-width: 0;
      flex: 1;
    }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      color: #39414a;
      font-weight: 800;
      background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(231,234,236,.82));
      border: 1px solid rgba(255,255,255,.92);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.92),
        0 10px 24px rgba(99, 102, 107, .10);
    }
    .avatar.small { width: 38px; height: 38px; font-size: 13px; }
    .avatar.tiny { width: 30px; height: 30px; font-size: 12px; }
    .msg-avatar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 18px;
      font-size: 17px;
      line-height: 1;
    }
    .brand-name {
      font-family: "DM Serif Display", Georgia, serif;
      font-weight: 400;
      font-size: 22px;
      letter-spacing: .02em;
      text-transform: uppercase;
      color: var(--text-strong);
    }
    .brand-sub {
      font-size: 12px;
      color: #6d8f7d;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .health-indicator {
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .16em;
      text-transform: uppercase;
      border: 1px solid rgba(126,123,112,.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.72);
    }
    .health-stable {
      color: #5f8c72;
      background: #eef7f1;
      border-color: rgba(95,140,114,.16);
    }
    .health-review {
      color: #b16a3d;
      background: #fff3e9;
      border-color: rgba(217,122,69,.16);
    }
    .health-urgent {
      color: #b55348;
      background: #faece8;
      border-color: rgba(187,90,79,.16);
    }

    .tabs {
      display: flex;
      gap: 10px;
      padding: 14px 22px 10px;
      overflow-x: auto;
      background: transparent;
    }
    .tab {
      border: 1px solid rgba(126,123,112,.12);
      border-radius: 999px;
      padding: 12px 16px;
      background: rgba(255,255,255,.48);
      color: #625d56;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.72);
    }
    .tab.active {
      background: var(--primary-soft);
      color: #a55a34;
      border-color: rgba(217,112,61,.12);
      box-shadow: 0 12px 22px rgba(217,112,61,.12);
    }

    .view {
      flex: 1;
      min-height: 0;
      display: none;
    }
    .view.active { display: flex; }

    .student-page,
    .thread-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }

    .msgs {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 16px 22px 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: transparent;
      scroll-behavior: smooth;
    }
    .msg-row { display: flex; gap: 10px; align-items: flex-start; }
    .msg-row.user { justify-content: flex-end; }
    .msg-col {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-width: min(70%, 440px);
    }
    .msg-col.user { align-items: flex-end; }
    .msg-name {
      font-size: 9px;
      color: #aba296;
      padding-left: 4px;
      text-transform: uppercase;
      letter-spacing: .12em;
      font-weight: 700;
    }
    .bubble {
      padding: 15px 18px;
      line-height: 1.62;
      white-space: pre-wrap;
      font-size: 15px;
      word-break: break-word;
      border-radius: 24px;
      color: #44403b;
      background: linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,255,255,.62));
      border: 1px solid rgba(255,255,255,.84);
      box-shadow: 0 12px 28px rgba(92,84,69,.07);
    }
    .bubble.user {
      color: #fff;
      background: linear-gradient(135deg, #ee9862, #d97440);
      border: none;
      box-shadow: 0 16px 28px rgba(217,112,61,.28);
      border-radius: 24px 24px 8px 24px;
    }
    .ts { font-size: 11px; color: #b0a79a; padding: 0 4px; }

    .composer {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 12px 18px calc(env(safe-area-inset-bottom) + 14px);
      border-top: 1px solid rgba(126,123,112,.08);
      background: linear-gradient(180deg, rgba(255,255,255,.38), rgba(255,255,255,.62));
      backdrop-filter: blur(18px);
    }
    .msg-input {
      flex: 1;
      border: 1px solid rgba(126,123,112,.14);
      border-radius: 999px;
      padding: 15px 20px;
      outline: none;
      background: rgba(255,255,255,.55);
      color: var(--text-strong);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.82),
        0 10px 24px rgba(96,84,67,.06);
    }
    .send-btn {
      width: 52px;
      height: 52px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, #ef9a65, #da7742);
      color: #fff;
      font-size: 20px;
      font-weight: 900;
      box-shadow: 0 14px 28px rgba(217,112,61,.26);
      cursor: pointer;
      flex-shrink: 0;
    }

    .typing { display: flex; gap: 4px; padding: 4px 0; }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(138,131,120,.8);
      animation: bounce 1s infinite;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }

    .dashboard {
      display: grid;
      grid-template-columns: 380px 1fr;
      min-height: 0;
      height: 100%;
      padding: 6px 18px 18px;
      gap: 20px;
    }

    .left-pane, .right-pane {
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, rgba(255,255,255,.56), rgba(255,255,255,.42));
      border: 1px solid rgba(255,255,255,.72);
      border-radius: 34px;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px 14px;
      border-bottom: 1px solid rgba(126,123,112,.08);
      background: transparent;
    }
    .toolbar-left, .toolbar-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .chip {
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.52);
      color: #6e665d;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid rgba(126,123,112,.10);
      cursor: pointer;
    }
    .chip.on {
      background: var(--primary-soft);
      color: #a75d36;
      border-color: rgba(217,112,61,.12);
    }

    .feed, .list, .thread-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
    }
    .feed, .list { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .thread-scroll { padding: 16px 18px 8px; }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.74), rgba(255,255,255,.58));
      border: 1px solid rgba(255,255,255,.76);
      border-radius: 28px;
      padding: 18px;
      box-shadow: 0 18px 34px rgba(92,84,69,.06);
    }
    .card-title {
      font-family: "DM Serif Display", Georgia, serif;
      font-size: 20px;
      line-height: 1.15;
      font-weight: 400;
      margin-bottom: 8px;
      color: var(--text-strong);
    }
    .card-body {
      font-size: 15px;
      line-height: 1.66;
      color: #4e4740;
    }
    .card-nameline {
      margin-bottom: 10px;
    }
    .attention-body {
      font-family: "Fraunces", "DM Serif Display", Georgia, serif;
      font-weight: 600;
      color: var(--text-strong);
      font-size: 18px;
      line-height: 1.35;
    }
    .card-meta {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255,255,255,.58);
      color: #6c655d;
      border: 1px solid rgba(126,123,112,.08);
    }
    .pill.red { background: #fdf0eb; color: #b15d46; }
    .pill.green { background: #edf7f1; color: #4f7c67; }
    .pill.amber { background: #fff4ea; color: #ad6f42; }
    .pill.baby-blue { background: #eaf4ff; color: #5f88b8; border-color: rgba(145, 184, 227, .22); }
    .pill.stone { background: rgba(255,255,255,.58); color: #6c655d; }
    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
    .clickable-card { cursor: pointer; }
    .clickable-card:hover { transform: translateY(-1px); box-shadow: 0 22px 44px rgba(91, 80, 64, .10); }
    .mini-btn {
      border: 1px solid rgba(126,123,112,.12);
      border-radius: 16px;
      padding: 10px 13px;
      background: rgba(255,255,255,.62);
      font-size: 13px;
      font-weight: 700;
      color: #4b453f;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.72);
    }
    .mini-btn.primary {
      background: rgba(255,255,255,.74);
      color: #4b453f;
      border-color: rgba(126,123,112,.12);
    }
    .mini-btn.attention {
      background: #fff4ea;
      color: #ad6f42;
      border-color: rgba(217,112,61,.14);
    }
    .mini-btn.danger {
      background: #f9ece8;
      color: #a45545;
      border-color: rgba(191,95,86,.12);
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: #a29a8e;
      text-transform: uppercase;
      letter-spacing: .18em;
      padding: 2px 6px;
    }

    .thread-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 18px 18px 14px;
      border-bottom: 1px solid rgba(126,123,112,.08);
      background: transparent;
    }
    .thread-title {
      font-family: "DM Serif Display", Georgia, serif;
      font-size: 26px;
      line-height: 1.08;
      font-weight: 400;
      color: var(--text-strong);
    }
    .thread-sub {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .empty {
      margin: auto;
      text-align: center;
      color: var(--muted);
      padding: 26px;
      max-width: 420px;
      line-height: 1.7;
    }

    .list-item {
      padding: 14px;
      border: 1px solid rgba(255,255,255,.68);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,.68), rgba(255,255,255,.52));
      cursor: pointer;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      box-shadow: 0 12px 24px rgba(92,84,69,.05);
    }
    .list-item.active {
      border-color: rgba(217,112,61,.18);
      background: linear-gradient(180deg, rgba(255,242,234,.94), rgba(255,246,239,.82));
    }
    .list-item-main { flex: 1; min-width: 0; }
    .list-title {
      font-weight: 800;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-strong);
    }
    .list-text {
      color: var(--muted);
      font-size: 13px;
      margin-top: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .list-meta { margin-top: 9px; display: flex; gap: 8px; flex-wrap: wrap; }
    .unread-dot {
      min-width: 24px;
      height: 24px;
      border-radius: 12px;
      display: inline-grid;
      place-items: center;
      background: linear-gradient(135deg, #ee9862, #d97440);
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      box-shadow: 0 10px 18px rgba(217,112,61,.22);
    }

    .status-note {
      font-size: 13px;
      color: var(--muted);
      margin: 0 18px 8px;
      padding: 12px 14px;
      border: 1px solid rgba(126,123,112,.07);
      border-radius: 18px;
      background: rgba(255,255,255,.42);
      line-height: 1.55;
    }

    .thread-shell {
      background: linear-gradient(180deg, rgba(255,255,255,.54), rgba(255,255,255,.36));
    }
    .thread-head {
      padding: 16px 18px 10px;
      align-items: flex-start;
    }
    .thread-head-left {
      min-width: 0;
      flex: 1;
    }
    .thread-title {
      margin-bottom: 4px;
    }
    .thread-actions {
      flex-shrink: 0;
      justify-content: flex-end;
    }
    .thread-scroll {
      padding-top: 10px;
    }
    .mini-btn.soft-icon {
      width: 40px;
      height: 40px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
    }
    .thread-back-btn {
      width: 38px;
      height: 38px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(126,123,112,.10);

    function toSlug(value) {
      return String(value).trim().toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
    }

    function getSessionCounterState() {
      const today = new Date().toISOString().slice(0, 10);
      const saved = loadJSON("linh_session_counter", null);
      if (saved && saved.date === today && Number.isInteger(saved.last)) return saved;
      return { date: today, last: 0 };
    }

    function nextSessionNumber() {
      const counter = getSessionCounterState();
      counter.last = (counter.last % 999) + 1;
      saveJSON("linh_session_counter", counter);
      return String(counter.last).padStart(3, "0");
    }

    function randomShuffle(list) {
      const copy = [...list];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function getNameCycleState() {
      const saved = loadJSON("linh_name_cycles", null);
      const nounIndex = saved && Number.isInteger(saved.nounIndex) ? saved.nounIndex : 0;
      const adjectiveQueue = Array.isArray(saved?.adjectiveQueue) && saved.adjectiveQueue.length
        ? saved.adjectiveQueue.filter(v => NAME_ADJECTIVES.includes(v))
        : randomShuffle(NAME_ADJECTIVES);
      return { nounIndex, adjectiveQueue };
    }

    function nextNamePair() {
      const cycle = getNameCycleState();
      if (!cycle.adjectiveQueue.length) cycle.adjectiveQueue = randomShuffle(NAME_ADJECTIVES);
      const adj = cycle.adjectiveQueue.shift();
      const noun = NAME_NOUNS[cycle.nounIndex % NAME_NOUNS.length];
      cycle.nounIndex = (cycle.nounIndex + 1) % NAME_NOUNS.length;
      if (!cycle.adjectiveQueue.length) cycle.adjectiveQueue = randomShuffle(NAME_ADJECTIVES);
      saveJSON("linh_name_cycles", cycle);
      return { adj, noun };
    }

    function uid() {
      const { adj, noun } = nextNamePair();
      const num = nextSessionNumber();
      return `${toSlug(adj)}-${toSlug(noun)}-${num}`;
    }

    function seededNumberFromString(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) {
        h = ((h << 5) - h) + str.charCodeAt(i);
        h |= 0;
      }
      return Math.abs(h);
    }

    function getDisplayName(sessionId) {
      const raw = String(sessionId || "").trim();
      const named = raw.match(/^([a-z]+)-([a-z]+)-(\d{3})$/i);
      if (named) {
        const [, adj, noun, num] = named;
        const pretty = (s) => s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
        return `${pretty(adj)} ${pretty(noun)} #${num}`;
      }
      const seed = seededNumberFromString(raw);
      const adj = NAME_ADJECTIVES[seed % NAME_ADJECTIVES.length];
      const noun = NAME_NOUNS[Math.floor(seed / 7) % NAME_NOUNS.length];
      const num = String(seed % 1000).padStart(3, "0");
      return `${adj} ${noun} #${num}`;
    }

    function el(tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text !== undefined) node.textContent = text;
      return node;
    }
    function loadJSON(key, fallback) { try { return JSON.parse(localStorage.getItem(key) || "null") || fallback; } catch { return fallback; } }
    function saveJSON(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
    function saveState() {
      saveJSON("linh_pinned_sessions", state.pinned);
      saveJSON("linh_trashed_sessions", state.trash);
      saveJSON("linh_reviewed_sessions", state.reviewed);
    }
    function setViewportHeight() {
      const vv = window.visualViewport;

      document.documentElement.style.setProperty("--viewport-height", `${Math.round(h)}px`);
    }
    setViewportHeight();
    window.addEventListener("resize", setViewportHeight);
    if (window.visualViewport) {
      visualViewport.addEventListener("resize", setViewportHeight);
      visualViewport.addEventListener("scroll", setViewportHeight);
    }

    function fmtTime(ts) {
      return new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }
    function fmtRelative(ts) {
      const diff = Date.now() - new Date(ts).getTime();
      if (diff < 60000) return `${Math.max(1, Math.floor(diff / 1000))}s ago`;
      if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
      return `${Math.floor(diff / 86400000)}d ago`;
    }
    function clip(text, n = 74) {
      const t = (text || "").replace(/\s+/g, " ").trim();
      return t.length > n ? t.slice(0, n).trim() + "…" : t;
    }
    function scrollBottom(node) {
      if (!node) return;
      requestAnimationFrame(() => { node.scrollTop = node.scrollHeight; });
    }
    function messageSignature(messages) {
      return messages.map(m => `${m.id || "x"}:${m.created_at}:${m.role}:${m.text}`).join("|");
    }
    function getSessionReviewKey(session) {
      return session?.lastSubstantive?.created_at || session?.last?.created_at || null;
    }
    function isSessionReviewed(session) {
      const key = getSessionReviewKey(session);
      return !!key && state.reviewed[session.session_id] === key;
    }
    function markSessionReviewed(session) {
      const key = getSessionReviewKey(session);
      if (!session?.session_id || !key) return;
      state.reviewed[session.session_id] = key;
      saveState();

    function purgeExpiredTrash() {
      const now = Date.now();

      Object.entries(state.trash).forEach(([sessionId, deletedAt]) => {

    const db = {

    function localReplyForStudent(messages, latest) {
      const text = (latest || "").trim();
      if (CATEGORY_REPLIES[text]) return CATEGORY_REPLIES[text];

      const priorUser = messages.filter(m => m.role === "user").map(m => (m.text || "").trim());
      const hasCategoryPick = priorUser.some(x => ["1", "2", "3", "4"].includes(x));
      const lower = text.toLowerCase();

      if (/^(ok|okay|thanks|thank you|thx|haha|hehe|hi|hello)$/i.test(text)) {
        return "Got it 😊 Linh will check soon.";
      }
      if (hasCategoryPick && priorUser.length <= 2) {
        return "Got it 🌿 I'll pass that along to Linh.";
      }
      if (/slow|too fast|lecture fast|teaching too fast/.test(lower)) {
        return "Got it — I'll pass that feedback to Linh.";
      }
      if (/deadline|assignment|quiz|exam|grade/.test(lower)) {
        return "Message received 💌 I'll take a look.";
      }
      return null;
    }

    async function askAI(messages) {

        body: JSON.stringify({ messages: messages.map(m => ({ role: m.role === "user" ? "user" : "assistant", content: m.text })) })
      });
      const raw = await res.text();
      if (!res.ok) throw new Error(raw);
      const data = JSON.parse(raw);
      let reply = data.reply || "Got it! Linh will get back to you soon 😊";
      reply = reply.replaceAll("Tiny", BOT_NAME);
      return reply;

    async function renderStudentChat(sessionId) {
      clearPollers();
      const app = document.getElementById("app");
      app.innerHTML = "";
      const shell = el("div", "shell");
      const page = el("div", "student-page");

      const hdr = el("div", "appbar");
      hdr.innerHTML = `
        <div class="brand">
          <div class="avatar">${BOT_AVATAR}</div>
          <div>
            <div class="brand-name">${BOT_HEADER}</div>
            <div class="brand-sub">Anonymous & secure</div>
          </div>
        </div>
      `;

      const msgs = el("div", "msgs");
      const composer = el("div", "composer");
      const input = el("input", "msg-input");
      input.placeholder = "Type a message...";
      const sendBtn = el("button", "send-btn", "➜");
      composer.appendChild(input);
      composer.appendChild(sendBtn);

      page.appendChild(hdr);
      page.appendChild(msgs);
      page.appendChild(composer);
      shell.appendChild(page);
      app.appendChild(shell);

      msgs.appendChild(makeBotBubble(STUDENT_WELCOME));

      let busy = false;
      let lastSig = "";

      async function drawMessages(forceScroll = false) {
        const all = await db.getMessages(sessionId);
        const sig = messageSignature(all);
        if (sig === lastSig) return;
        lastSig = sig;
        msgs.innerHTML = "";
        msgs.appendChild(makeBotBubble(STUDENT_WELCOME));
        all.forEach(m => {
          const ts = new Date(m.created_at).getTime();
          msgs.appendChild(m.role === "user" ? makeUserBubble(m.text, ts) : makeBotBubble(m.text, ts));
        });
        if (forceScroll || true) scrollBottom(msgs);
      }

      try { await drawMessages(true); } catch (err) { console.error(err); }

      async function sendMessage() {
        const text = input.value.trim();
        if (!text || busy) return;
        busy = true;
        input.disabled = true;
        sendBtn.disabled = true;
        input.value = "";
        msgs.appendChild(makeUserBubble(text, Date.now()));
        const typing = makeTypingBubble();
        msgs.appendChild(typing);
        scrollBottom(msgs);

        try {
          await db.insertMessage({ session_id: sessionId, role: "user", text, read: false });
          const all = await db.getMessages(sessionId);
          let reply = localReplyForStudent(all, text);
          if (!reply) reply = await askAI(all);
          await db.insertMessage({ session_id: sessionId, role: "bot", text: reply, read: true });
          typing.remove();
          msgs.appendChild(makeBotBubble(reply, Date.now()));
          scrollBottom(msgs);
          lastSig = messageSignature(await db.getMessages(sessionId));
        } catch (err) {
          console.error(err);
          typing.remove();
          msgs.appendChild(makeBotBubble(`Got it 😊 ${BOT_NAME} will get back to you soon.`, Date.now()));
          scrollBottom(msgs);
        } finally {
          busy = false;
          input.disabled = false;
          sendBtn.disabled = false;
          input.focus();
        }
      }

      sendBtn.onclick = sendMessage;
      input.addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(); });
      input.addEventListener("focus", () => scrollBottom(msgs));

      const poll = setInterval(() => drawMessages(false).catch(console.error), 3500);
      state.pollers.push(poll);
      window.onbeforeunload = clearPollers;
    }

    function getIntentFromSession(messages) {
      const firstUser = messages.find(m => m.role === "user");
      const pick = firstUser && ["1", "2", "3", "4"].includes((firstUser.text || "").trim()) ? firstUser.text.trim() : null;
      return pick ? CATEGORY_LABELS[pick] : null;
    }

    function getSubstantiveUserMessages(messages) {
      return messages.filter(m => m.role === "user" && !["1","2","3","4"].includes((m.text || "").trim()));
    }

    function inferTopic(text = "") {
      const lower = text.toLowerCase();
      if (/slow|chậm|too fast|nhanh|pace|giảng/.test(lower)) return "lecture pace";
      if (/deadline|due|assignment|bài tập|homework/.test(lower)) return "assignment / deadline";
      if (/quiz|exam|test|midterm|final/.test(lower)) return "quiz / exam";
      if (/grade|điểm|mark|score/.test(lower)) return "grades";
      if (/slide|recording|note|material|tài liệu/.test(lower)) return "materials";
      if (/office hour|meeting|hẹn|gặp/.test(lower)) return "meeting / follow-up";
      if (/confused|không hiểu|help|khó quá|struggling|stress/.test(lower)) return "needs support";
      return "general";
    }

    function needsHuman(intent, text = "") {
      const lower = text.toLowerCase();
      if (!text.trim()) return false;
      if (intent === "feedback" && !/[?？]/.test(text) && !/urgent|gấp|help|không hiểu|confused|meeting|private|riêng/i.test(lower)) return false;
      if (/urgent|gấp|private|riêng|confused|không hiểu|need help|help me|meeting|office hour|grade|điểm|deadline|quiz|exam|why|how|what|can you|could you|please/i.test(lower)) return true;
      if (/[?？]/.test(text)) return true;
      if (intent === "question" || intent === "other request") return true;
      return false;
    }

    function collectSessionsFromMessages(rows) {
      const map = new Map();
      rows.forEach(r => {
        if (!map.has(r.session_id)) map.set(r.session_id, []);
        map.get(r.session_id).push(r);
      });

      const sessions = [];
      map.forEach((messages, sessionId) => {
        messages.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
        const last = messages[messages.length - 1];
        const userMessages = messages.filter(m => m.role === "user");
        const substantive = getSubstantiveUserMessages(messages);
        const lastSubstantive = substantive[substantive.length - 1];
        const intent = getIntentFromSession(messages);
        const topic = inferTopic(lastSubstantive?.text || userMessages[userMessages.length - 1]?.text || "");
        const unread = userMessages.filter(m => !m.read).length;
        const lastUser = userMessages[userMessages.length - 1];
        const latestIsBarePick = lastUser && ["1","2","3","4"].includes((lastUser.text || "").trim()) && substantive.length === 0;
        const pendingHuman = !latestIsBarePick && !!lastSubstantive && needsHuman(intent, lastSubstantive.text) && new Date(last.created_at) >= new Date(lastSubstantive.created_at);
        const summarizeOnly = !!lastSubstantive && !pendingHuman;
        sessions.push({
          session_id: sessionId,
          messages,
          last,
          last_text: last?.text || "",
          unread,
          intent,
          topic,
          pinned: !!state.pinned[sessionId],
          trashed: !!state.trash[sessionId],
          deleted_at: state.trash[sessionId] || null,
          latestIsBarePick,
          lastSubstantive,
          pendingHuman,
          summarizeOnly,
          reviewed: false
        });
      });

      sessions.forEach(s => { s.reviewed = isSessionReviewed(s); });
      sessions.sort((a,b) => new Date(b.last.created_at) - new Date(a.last.created_at));
      return sessions;
    }

    function isUrgentSignal(session) {
      const text = ((session?.lastSubstantive?.text || session?.last_text || "") + " " + (session?.topic || "")).toLowerCase();
      return /(too fast|slow down|slower|don't understand|do not understand|confused|confusing|lost|urgent|asap|immediately|right now|cannot follow|can't follow)/.test(text);
    }


    function classifySmartTag(session) {
      const text = ((session?.lastSubstantive?.text || session?.last_text || "") + " " + (session?.topic || "")).toLowerCase();

      const positive = /(thank you|thanks|love|great|helpful|good job|well done|clear now|understand now|better now|appreciate|liked|awesome|excellent|amazing|that helped)/.test(text);
      const urgent = /(too fast|slow down|slower|don\'t understand|do not understand|confused|confusing|lost|urgent|asap|immediately|right now|cannot follow|can\'t follow|not clear|hard to follow|no idea)/.test(text);
      const question = /\?|what|why|how|when|where|can you|could you|would you/.test(text);

      if (session?.reviewed) return { label: "Reviewed", tone: "green" };
      if (urgent) return { label: "Urgent", tone: "red" };
      if (positive) return { label: "Positive", tone: "green" };
      if (question || session?.pendingHuman) return { label: "Needs review", tone: "baby-blue" };
      return { label: "FYI", tone: "stone" };
    }

    function computeClassHealth(sessions) {
      const active = sessions.filter(s => !s.trashed && s.lastSubstantive && !s.reviewed);
      let urgentCount = 0;
      let reviewCount = 0;

      active.forEach(s => {
        const tag = classifySmartTag(s);
        if (tag.tone === "red") urgentCount++;
        else if (tag.tone === "baby-blue") reviewCount++;
      });

      if (urgentCount >= 2) return { text: "Status: Urgent", cls: "health-urgent" };
      if (urgentCount >= 1 || reviewCount >= 3) return { text: "Status: Review", cls: "health-review" };
      return { text: "Status: Stable", cls: "health-stable" };
    }

    function buildCopilotFeed(sessions) {
      const active = sessions.filter(s => !s.trashed);
      const recent = active.filter(s => Date.now() - new Date(s.last.created_at).getTime() < 60 * 60 * 1000);
      const needsAttention = recent.filter(s => s.pendingHuman && !s.reviewed);
      const summaries = recent.filter(s => s.summarizeOnly && s.lastSubstantive && !s.reviewed);

      const feedbackClusters = new Map();
      summaries.forEach(s => {
        const key = `${s.intent || "general"}|${s.topic}`;
        if (!feedbackClusters.has(key)) feedbackClusters.set(key, []);
        feedbackClusters.get(key).push(s);
      });

      const cards = [];
      if (needsAttention.length) {
        needsAttention.slice(0, 8).forEach(s => {
          cards.push({
            type: "attention",
            session_id: s.session_id,
            title: "",
            body: s.lastSubstantive ? clip(s.lastSubstantive.text, 180) : clip(s.last_text, 180),
            name: getDisplayName(s.session_id),
            meta: [fmtRelative(s.last.created_at), ...(s.topic && s.topic !== "general" ? [s.topic] : [])],
            pill: "Open original chat",
            severity: isUrgentSignal(s) ? "red" : "amber",
            smartTag: classifySmartTag(s)
          });
        });
      }

      [...feedbackClusters.entries()]
        .sort((a,b) => b[1].length - a[1].length)
        .forEach(([key, items]) => {
          const [intent, topic] = key.split("|");
          if (items.length === 1) {
            const s = items[0];
            cards.push({
              type: "summary",
              session_id: s.session_id,
              title: intent === "feedback" ? `Feedback summary${topic === "general" ? "" : `: ${topic}`}` : `FYI${topic === "general" ? "" : `: ${topic}`}`,
              body: clip(s.lastSubstantive.text, 180),
              name: getDisplayName(s.session_id),
              meta: [fmtRelative(s.last.created_at), `1 student`],
              severity: "green",
              smartTag: classifySmartTag(s)
            });
          } else {
            const recentMinutes = Math.max(1, Math.round((Date.now() - new Date(items[items.length - 1].last.created_at).getTime()) / 60000));
            cards.push({
              type: "cluster",
              cluster_key: key,
              title: `${items.length} students mentioned ${topic}`,
              body: intent === "feedback"
                ? `Common signal: several students are bringing up ${topic}. You probably do not need to open each chat unless you want the raw wording.`
                : `Multiple students are talking about ${topic}. This looks like a recurring theme worth noting.` ,
              meta: [`Last ${recentMinutes}m`, `${items.length} students`, intent],
              severity: intent === "feedback" ? "amber" : "green",
              smartTag: { label: items.length > 1 ? "Pattern" : "FYI", tone: intent === "feedback" ? "amber" : "green" },
              relatedSessions: items.map(x => x.session_id)
            });
          }
        });

      const pinnedSessions = active.filter(s => s.pinned);
      pinnedSessions.forEach(s => {
        cards.unshift({
          type: "pinned",
          session_id: s.session_id,
          title: `Pinned: ${getDisplayName(s.session_id)}`,
          body: clip(s.lastSubstantive?.text || s.last_text, 160),
          meta: [fmtRelative(s.last.created_at), ...(s.topic && s.topic !== "general" ? [s.topic] : [])],
          severity: "amber",
          smartTag: { label: "Pinned", tone: "stone" }
        });
      });

      return cards;
    }

    async function openSessionFromAI(card, sessions) {
      const sessionId = card.session_id || card.relatedSessions?.[0];
      if (!sessionId) return;
      const session = sessions.find(s => s.session_id === sessionId);
      if (!session) return;
      state.selectedSession = sessionId;
      state.revealOriginal = true;
      markSessionReviewed(session);
      try { await db.markUserMessagesRead(sessionId); } catch {}
      await refreshAdminData(true).catch(console.error);
      setTimeout(() => {
        const right = document.getElementById("linh-ai-right");
        if (right) {
          if (window.innerWidth <= 980) right.classList.add("thread-drawer-open");
          renderThreadPane(session, right, { aiDrawer: true, sessions });
        }
      }, 30);
    }

    function renderPill(text, color = "") {
      const pill = el("span", `pill ${color}`.trim(), text);
      return pill;
    }

    function buildDashboard(kind) {
      const root = el("div", "dashboard");
      const left = el("div", "left-pane");
      const right = el("div", "right-pane");
      left.id = `${kind}-left`;
      right.id = `${kind}-right`;
      root.appendChild(left);
      root.appendChild(right);
      return root;
    }

    async function refreshAdminData(force) {
      purgeExpiredTrash();
      const rows = await db.getAllMessages();
      const sessions = collectSessionsFromMessages(rows);
      const snapshotSig = messageSignature(rows);
      if (!force && snapshotSig === state.sessionsSnapshotSig) return;
      state.sessionsSnapshotSig = snapshotSig;

      if (state.selectedSession && !sessions.some(s => s.session_id === state.selectedSession && !s.trashed)) {
        state.selectedSession = null;
      }
      updateClassHealthIndicator(sessions);

      if (state.adminView === "linh-ai") {
        renderLinhAI(sessions);
      } else if (state.adminView === "chats") {
        renderOriginalChats(sessions.filter(s => !s.trashed));
      } else {
        renderTrash(sessions.filter(s => s.trashed));
      }
    }

    function renderLinhAI(sessions) {
      const left = document.getElementById("linh-ai-left");
      const right = document.getElementById("linh-ai-right");
      if (!left || !right) return;

      left.innerHTML = "";
      right.innerHTML = "";

      const toolbar = el("div", "toolbar toolbar-visible");
      const leftBits = el("div", "toolbar-left");
      const toggleBtn = el("button", `chip ${state.revealOriginal ? "on" : ""}`.trim(), state.revealOriginal ? "Hide original chats" : "");
      toggleBtn.onclick = () => { state.revealOriginal = !state.revealOriginal; renderLinhAI(sessions); };
      leftBits.appendChild(toggleBtn);
      toolbar.appendChild(leftBits);
      left.appendChild(toolbar);

      const feed = el("div", "feed");
      updateClassHealthIndicator(sessions);
      const cards = buildCopilotFeed(sessions);

      if (!cards.length) {
        const empty = el("div", "empty", `No urgent signals right now. ${BOT_NAME} AI will summarize new student messages here instead of dumping every chat on you.`);
        feed.appendChild(empty);
      } else {
        cards.forEach(card => {
          const cardIsClickable = !!(card.session_id || card.relatedSessions?.length);
          const isActiveCard = !!card.session_id && card.session_id === state.selectedSession && state.revealOriginal;
          const node = el("div", `card ${cardIsClickable ? "clickable-card" : ""} ${isActiveCard ? "active" : ""}`.trim());
          if (cardIsClickable) {
            node.tabIndex = 0;
            node.onclick = () => openSessionFromAI(card, sessions);
            node.onkeydown = (e) => {
              if (e.key === "Enter" || e.key === " ") {
                e.preventDefault();
                openSessionFromAI(card, sessions);
              }
            };
          }
          if (card.title) node.appendChild(el("div", "card-title", card.title));
          if (card.name) {
            const nameLine = el("div", "card-nameline");
            nameLine.appendChild(renderPill(card.name, "stone"));
            node.appendChild(nameLine);
          }
          const bodyEl = el("div", "card-body", card.body);
          if (card.type === "attention") bodyEl.classList.add("attention-body");
          node.appendChild(bodyEl);
          const meta = el("div", "card-meta");
          if (card.smartTag) meta.appendChild(renderPill(card.smartTag.label, card.smartTag.tone));
          else {
            if (card.severity === "red") meta.appendChild(renderPill("Urgent", "red"));
            if (card.severity === "amber") meta.appendChild(renderPill(card.type === "attention" ? "Needs review" : "Summary", "amber"));
            if (card.severity === "green") meta.appendChild(renderPill("FYI", "green"));
          }
          (card.meta || []).forEach(m => meta.appendChild(renderPill(m)));
          node.appendChild(meta);
          const actions = el("div", "card-actions");

          if (card.session_id) {
            const openBtn = el("button", `mini-btn ${card.severity === "red" ? "attention" : "primary"}`.trim(), card.pill || "Open original chat");
            openBtn.onclick = async (e) => { e.stopPropagation(); await openSessionFromAI(card, sessions); };
            actions.appendChild(openBtn);

            const pinBtn = el("button", "mini-btn", state.pinned[card.session_id] ? "Unpin" : "Pin");
            pinBtn.onclick = (e) => {
              e.stopPropagation();
              if (state.pinned[card.session_id]) delete state.pinned[card.session_id]; else state.pinned[card.session_id] = true;
              saveState();
              refreshAdminData(true).catch(console.error);
            };
            actions.appendChild(pinBtn);
          }

          if (card.relatedSessions?.length) {
            const openGroup = el("button", "mini-btn primary", `Open ${card.relatedSessions.length} related chats`);
            openGroup.onclick = (e) => { e.stopPropagation(); openSessionFromAI(card, sessions); };
            actions.appendChild(openGroup);
          }

          node.appendChild(actions);
          feed.appendChild(node);
        });
      }
      left.appendChild(feed);

      right.classList.remove("thread-drawer-open");
      if (!state.revealOriginal) {
        right.innerHTML = "<div class='empty'>Original chats are hidden right now. That keeps this screen focused on summaries and only the messages that really need you.</div>";
      } else {
        const activeSession = sessions.find(s => s.session_id === state.selectedSession && !s.trashed);
        if (activeSession) {
          if (window.innerWidth <= 980) right.classList.add("thread-drawer-open");
          renderThreadPane(activeSession, right, { aiDrawer: true, sessions });
        } else {
          right.innerHTML = "<div class='empty'>Tap a feedback card to open the raw wording in a cleaner thread view.</div>";
        }
      }
    }

    function renderThreadPane(session, targetContainer, options = {}) {
      const container = targetContainer || document.querySelector("#linh-ai-right .right-pane") || document.getElementById("linh-ai-right") || document.querySelector("#chats-right");
      if (!container) return;
      container.innerHTML = "";
      if (!session) {
        container.appendChild(el("div", "empty", "Select a chat only when you need the raw student wording. The AI inbox on the left is meant to save you from opening every thread."));
        return;
      }

      const shell = el("div", "thread-shell");
      const head = el("div", "thread-head");
      const leftHead = el("div", "thread-head-left");
      const titleWrap = el("div", "thread-title-wrap");
      const topicPart = session.topic && String(session.topic).toLowerCase() !== "general" ? ` • ${session.topic}` : "";
      titleWrap.innerHTML = `<div class="thread-title">${getDisplayName(session.session_id)}</div><div class="thread-sub">${session.intent || "message"}${topicPart} • ${fmtRelative(session.last.created_at)}</div>`;
      leftHead.appendChild(titleWrap);
      const rightHead = el("div", "toolbar-right thread-actions");
      if (options.aiDrawer) {
        leftHead.classList.add("with-back");
        const backBtn = el("button", "thread-back-btn", "←");
        backBtn.setAttribute("aria-label", "Back");
        backBtn.onclick = () => {
          state.selectedSession = null;
          state.revealOriginal = false;
          refreshAdminData(true).catch(console.error);
        };
        leftHead.prepend(backBtn);
      }
      const pinBtn = el("button", "mini-btn", session.pinned ? "Unpin" : "Pin");
      pinBtn.onclick = () => {
        if (state.pinned[session.session_id]) delete state.pinned[session.session_id]; else state.pinned[session.session_id] = true;
        saveState();
        refreshAdminData(true).catch(console.error);
      };
      const trashBtn = el("button", "mini-btn danger", "Trash");
      trashBtn.onclick = () => {
        if (state.pinned[session.session_id]) return;
        state.trash[session.session_id] = Date.now();
        saveState();
        if (state.selectedSession === session.session_id) state.selectedSession = null;
        refreshAdminData(true).catch(console.error);
      };
      rightHead.appendChild(pinBtn);
      if (!session.pinned) rightHead.appendChild(trashBtn);
      head.appendChild(leftHead);
      head.appendChild(rightHead);
      shell.appendChild(head);


      const sc = el("div", "thread-scroll");
      session.messages.forEach(m => sc.appendChild(m.role === "user" ? makeUserBubble(m.text, m.created_at) : makeBotBubble(m.text, m.created_at)));
      shell.appendChild(sc);

      const composer = el("div", "composer");
      const input = el("input", "msg-input");
      input.placeholder = "Type a reply...";
      const send = el("button", "send-btn", "➜");
      composer.appendChild(input);
      composer.appendChild(send);
      shell.appendChild(composer);
      container.appendChild(shell);
      scrollBottom(sc);

      const sig = messageSignature(session.messages);
      state.threadCacheSig = sig;

      async function sendReply() {
        const text = input.value.trim();
        if (!text) return;
        input.disabled = true; send.disabled = true;
        try {
          await db.insertMessage({ session_id: session.session_id, role: "bot", text, read: true });
          input.value = "";
          await db.markUserMessagesRead(session.session_id).catch(() => {});
          await refreshAdminData(true);
        } catch (err) {
          console.error(err);
        } finally {
          input.disabled = false; send.disabled = false; input.focus();
        }
      }
      send.onclick = sendReply;
      input.addEventListener("keydown", e => { if (e.key === "Enter") sendReply(); });
      input.addEventListener("focus", () => scrollBottom(sc));
    }

    renderHome();
  </script>
</body>
</html>
